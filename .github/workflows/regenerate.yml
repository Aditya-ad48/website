name: Doc Sync - Regenerate on Comment

on:
  issue_comment:
    types: [created]

jobs:
  regenerate:
    # Only run on PR comments (not issue comments) containing /regenerate
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/regenerate')

    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Acknowledge the command
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '🔄 Regenerating documentation... Please wait.'
            });

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          # Checkout the PR's head branch so we can commit back to it
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install PyGithub google-generativeai

      - name: Extract diff payload from PR body
        id: extract
        uses: actions/github-script@v7
        with:
          script: |
            // Fetch the PR body
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            const body = pr.data.body || '';

            // Extract the hidden payload block
            // Format: <!-- krkn-sync-bot-payload\nupstream_file:...\ndiff_b64:...\n-->
            const payloadMatch = body.match(
              /<!-- krkn-sync-bot-payload\nupstream_file:(.+)\ndiff_b64:(.+)\n-->/s
            );
            if (!payloadMatch) {
              core.setFailed('Could not find krkn-sync-bot-payload in PR body.');
              return;
            }
            core.setOutput('upstream_file', payloadMatch[1].trim());
            core.setOutput('diff_b64', payloadMatch[2].trim());

            // Also get the PR's head branch name for committing back
            core.setOutput('head_branch', pr.data.head.ref);

      - name: Clone bot repo for detector/generator modules
        run: |
          git clone https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/Aditya-ad48/krkn-docs-bot.git /tmp/krkn-docs-bot

      - name: Decode diff and run regeneration
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          UPSTREAM_FILE: ${{ steps.extract.outputs.upstream_file }}
        run: |
          # Decode the stored diff
          echo "${{ steps.extract.outputs.diff_b64 }}" | base64 -d > /tmp/upstream.diff

          echo "Upstream file: $UPSTREAM_FILE"
          cat /tmp/upstream.diff

          # Run the regeneration using bot code from the cloned repo
          python3 - <<'EOF'
          import sys, os
          sys.path.insert(0, '/tmp/krkn-docs-bot')
          from bot.detector import detect_from_diff
          from bot.generator import generate_updated_tab

          upstream_file = os.environ.get('UPSTREAM_FILE', '')
          with open('/tmp/upstream.diff') as f:
              diff = f.read()

          result = detect_from_diff(diff, upstream_file)
          tab_path = result.target_tab

          with open(tab_path) as f:
              current = f.read()

          all_params = [cf.name for cf in result.changed_fields] + [
              "ACTION", "LABEL_SELECTOR", "EXCLUDE_LABEL", "NODE_NAME",
              "INSTANCE_COUNT", "RUNS", "CLOUD_TYPE", "TIMEOUT", "DURATION",
              "KUBE_CHECK", "PARALLEL", "VERIFY_SESSION", "SKIP_OPENSHIFT_CHECKS",
              "BMC_USER", "BMC_PASSWORD", "BMC_ADDR", "DISKS", "DISABLE_SSL_VERIFICATION",
          ]
          updated = generate_updated_tab(current, result.changed_fields, result.scenario, all_params)

          with open(tab_path, 'w') as f:
              f.write(updated)

          print(f'Done. Updated: {tab_path}')
          EOF

      - name: Commit regenerated file
        run: |
          git config user.name "krkn-docs-sync-bot"
          git config user.email "krkn-docs-sync-bot@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "docs: regenerate via /regenerate command"
          git push

      - name: Post success comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '✅ Documentation regenerated successfully. Please review the updated diff.'
            });
